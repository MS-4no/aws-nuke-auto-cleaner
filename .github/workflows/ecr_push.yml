name: ECR PUSH Action

on:
  push:
    branches:
      - main # mainブランチへのpush時のみ実行

env:
  AWS_REGION: ap-northeast-1

jobs:
  build-and-push:
    runs-on: [self-hosted, Linux, X64]

    steps:
      # ① ソースコードをランナーにチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4

      # ② AWSクレデンシャルを設定
      - name: Configure AWS credentials
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws configure set region ${{ env.AWS_REGION }}

      # ③ ECRにログイン
      - name: Login to Amazon ECR
        id: login-ecr
        run: |
          ECR_REGISTRY=$(aws sts get-caller-identity --query Account --output text).dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin $ECR_REGISTRY
          echo "registry=$ECR_REGISTRY" >> $GITHUB_OUTPUT

      # ④ nuke-lambda-scan のビルド＆プッシュ
      - name: Build and push nuke-lambda-scan
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          cd nuke-lambda-scan
          docker build --platform linux/amd64 -t $ECR_REGISTRY/nuke-lambda:latest .
          docker push $ECR_REGISTRY/nuke-lambda:latest

      # ⑤ nuke-lambda-delete のビルド＆プッシュ
      - name: Build and push nuke-lambda-delete
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          cd nuke-lambda-delete
          docker build --platform linux/amd64 -t $ECR_REGISTRY/nuke-lambda-delete:latest .
          docker push $ECR_REGISTRY/nuke-lambda-delete:latest
